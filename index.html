<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pomodoro Timer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="timer-container">
    <h1 class="title" id="phaseTitle">Pomodoro</h1>
    <div class="timer-display" aria-live="polite">
      <span class="minutes">25</span><span class="separator">:</span><span class="seconds">00</span>
    </div>
    <div class="controls">
      <button type="button" class="btn btn-start" id="startBtn" aria-label="Start timer">Start</button>
      <button type="button" class="btn btn-reset" id="resetBtn" aria-label="Reset timer">Reset</button>
    </div>
    <p class="nav-link"><a href="flashcards.html">FE Environmental Flashcards →</a></p>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
