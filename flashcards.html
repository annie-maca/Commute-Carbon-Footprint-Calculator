<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FE Environmental Anchor Search Flashcards</title>
  <link rel="stylesheet" href="flashcards.css">
</head>
<body>
  <div class="flashcard-app">
    <header class="header">
      <h1 class="title">FE Environmental Anchor Search</h1>
      <p class="subtitle">Card <span id="currentNum">1</span> of <span id="totalNum">11</span></p>
      <div class="header-actions">
        <button type="button" class="btn btn-shuffle" id="shuffleBtn" aria-label="Shuffle deck">Shuffle</button>
        <a href="index.html" class="btn btn-link">← Timer</a>
      </div>
    </header>

    <div class="deck">
      <div class="card-wrapper" id="cardWrapper">
        <div class="card" id="card" tabindex="0">
          <div class="card-inner">
            <div class="card-face card-front">
              <div class="card-label">Front</div>
              <p class="card-text" id="frontText"></p>
            </div>
            <div class="card-face card-back">
              <div class="card-label">Back</div>
              <div class="card-text back-content" id="backText"></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="controls">
      <button type="button" class="btn btn-nav" id="prevBtn" aria-label="Previous card">← Prev</button>
      <button type="button" class="btn btn-flip" id="flipBtn" aria-label="Flip card">Flip</button>
      <button type="button" class="btn btn-nav" id="nextBtn" aria-label="Next card">Next →</button>
    </div>

    <p class="hint">Click card or press Space to flip · Arrow keys to navigate</p>
  </div>
  <script src="flashcards.js"></script>
</body>
</html>
